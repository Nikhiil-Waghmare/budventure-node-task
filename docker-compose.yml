version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: grocery_user
      POSTGRES_PASSWORD: grocery_password
      POSTGRES_DB: grocery_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grocery_user -d grocery_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: "postgres://grocery_user:grocery_password@db:5432/grocery_db"
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      POOL_MODE: transaction
    ports:
      - "6432:5432"
    volumes:
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    depends_on:
      db:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: "postgresql://grocery_user:grocery_password@pgbouncer:5432/grocery_db?schema=public&pgbouncer=true&connection_limit=20&connect_timeout=5&statement_timeout=5000"
      DIRECT_DATABASE_URL: "postgresql://grocery_user:grocery_password@db:5432/grocery_db?schema=public&connect_timeout=5&statement_timeout=5000"
      REDIS_URL: "redis://redis:6379"
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - pgbouncer
      - redis

volumes:
  postgres_data:
